<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Project</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    .badge { font-size: 1.2rem; opacity: 0.8; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      margin: 0.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-secondary { border: 2px solid #fff; color: #fff; }
    .footer { margin-top: 3rem; opacity: 0.5; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 My Project</h1>
    <p class="badge">A well-structured open source project template</p>
    <div>
      <a href="https://github.com/Pitt-Lee/my-opensource-project" class="btn btn-primary">GitHub</a>
      <a href="https://github.com/Pitt-Lee/my-opensource-project#-getting-started" class="btn btn-secondary">Get Started</a>
    </div>
    <p class="footer">MIT License &copy; 2025 fuxiang</p>
  </div>
</body>
</html>
